name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build JS + CSS
        run: node esbuild.config.mjs

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Prepare dist/
        run: |
          mkdir -p dist/templates/actor/sheet-tabs dist/templates/actor/partials
          mkdir -p dist/templates/item dist/templates/chat dist/lang

          cp static/system.json   dist/
          cp static/template.json dist/
          cp static/lang/*.json   dist/lang/

          cp src/actor/character/templates/character-sheet.hbs           dist/templates/actor/corredor-sheet.hbs
          cp src/actor/character/templates/sheet-tabs/*.hbs              dist/templates/actor/sheet-tabs/
          cp src/actor/templates/partials/resources-bar.hbs              dist/templates/actor/partials/
          cp src/actor/ameaca/templates/ameaca-sheet.hbs                 dist/templates/actor/
          cp src/actor/vehicle/templates/vehicle-sheet.hbs               dist/templates/actor/veiculo-sheet.hbs
          cp src/item/templates/*-sheet.hbs                              dist/templates/item/
          cp src/components/chat/*.hbs                                   dist/templates/chat/

      - name: Patch system.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          REPO="${{ github.repository }}"
          node -e "
            const fs   = require('fs');
            const json = JSON.parse(fs.readFileSync('dist/system.json','utf8'));
            json.version   = '${VERSION}';
            json.manifest  = 'https://raw.githubusercontent.com/${REPO}/main/dist/system.json';
            json.download  = 'https://github.com/${REPO}/releases/download/v${VERSION}/flatline-fvtt_v${VERSION}.zip';
            json.esmodules = ['flatline.js'];
            json.styles    = ['flatline.css'];
            fs.writeFileSync('dist/system.json', JSON.stringify(json, null, 2));
            console.log('Versão:', json.version);
          "

      - name: Create zip
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd dist && zip -r ../flatline-fvtt_v${VERSION}.zip .
          echo "ZIP=flatline-fvtt_v${VERSION}.zip" >> $GITHUB_ENV

      - name: Commit dist/ to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add dist/
          git diff --staged --quiet || git commit -m "chore: build dist v${{ steps.version.outputs.VERSION }} [skip ci]"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FLATLINE v${{ steps.version.outputs.VERSION }}"
          body: |
            ## FLATLINE v${{ steps.version.outputs.VERSION }}

            ### Instalação no Foundry VTT
            Cole no campo **Manifest URL**:
            ```
            https://raw.githubusercontent.com/${{ github.repository }}/main/dist/system.json
            ```
          files: ${{ env.ZIP }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
